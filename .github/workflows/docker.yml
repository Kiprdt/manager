name: Build and push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ghcr.io/kiprdt/manager-api:latest
            ghcr.io/kiprdt/manager-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          # Пустые VITE_* → фронт ходит на тот же origin (nginx проксирует /api, /ws).
          build-args: |
            VITE_API_URL=
            VITE_WS_URL=
          tags: |
            ghcr.io/kiprdt/manager-web:latest
            ghcr.io/kiprdt/manager-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
