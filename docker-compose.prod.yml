version: '3.9'

# Прод-вариант: готовые образы из GHCR (собираются GitHub Actions).
# На сервере собирать ничего не нужно:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# IMAGE_TAG можно зафиксировать на конкретный commit sha (по умолчанию latest).
services:
  api:
    image: ghcr.io/kiprdt/manager-api:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: file:/data/app.db
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET обязателен (≥16 символов)}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - app-db:/data
      - uploads:/app/packages/api/uploads
    restart: unless-stopped
    expose:
      - '3001'

  web:
    image: ghcr.io/kiprdt/manager-web:${IMAGE_TAG:-latest}
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  app-db:
  uploads:
